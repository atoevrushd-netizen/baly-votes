<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Балы — Экран</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0a12;
      --surface: #10101e;
      --surface2:#18182c;
      --border:  #1e1e38;
      --purple:  #7c3aed;
      --purple-l:#a78bfa;
      --gold:    #f59e0b;
      --red:     #ef4444;
      --green:   #22c55e;
      --text:    #f0f0fa;
      --sub:     #7070a8;
      --muted:   #3a3a60;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); }
    body {
      color: var(--text);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ───────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 16px;
    }

    .logo {
      font-size: 1.35rem;
      font-weight: 900;
      letter-spacing: -1px;
      white-space: nowrap;
    }
    .logo em { color: var(--purple); font-style: normal; }

    .header-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .phase-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: .5px;
    }
    .phase-badge.idle     { background: var(--surface2); color: var(--sub);     border: 1px solid var(--border); }
    .phase-badge.present  { background: rgba(124,58,237,.15); color: var(--purple-l); border: 1px solid rgba(124,58,237,.3); }
    .phase-badge.voting   { background: rgba(245,158,11,.12); color: var(--gold);    border: 1px solid rgba(245,158,11,.3); }

    .dot-badge {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-idle    { background: var(--sub); }
    .dot-present { background: var(--purple-l); box-shadow: 0 0 5px var(--purple); }
    .dot-voting  { background: var(--gold); box-shadow: 0 0 5px var(--gold); animation: blink 1s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

    .header-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

    .btn {
      padding: 9px 18px;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .18s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: .35; cursor: not-allowed; }

    .btn-purple { background: var(--purple); color: #fff; }
    .btn-purple:not(:disabled):hover { background: #6d28d9; box-shadow: 0 4px 16px rgba(124,58,237,.35); }

    .btn-gold { background: rgba(245,158,11,.15); color: var(--gold); border: 1px solid rgba(245,158,11,.3); }
    .btn-gold:not(:disabled):hover { background: rgba(245,158,11,.25); }

    .btn-red { background: rgba(239,68,68,.1); color: var(--red); border: 1px solid rgba(239,68,68,.25); }
    .btn-red:not(:disabled):hover { background: rgba(239,68,68,.2); }

    .btn-ghost { background: var(--surface2); color: var(--sub); border: 1px solid var(--border); }
    .btn-ghost:not(:disabled):hover { color: var(--text); }

    /* ── Main layout ──────────────────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar (always visible) ─────────────────────────────────────────── */
    .sidebar {
      width: 300px;
      flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      order: 2;
    }
    .sidebar-header {
      padding: 20px 20px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-label {
      font-size: .6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--sub);
    }
    .sidebar-count {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .sidebar-list { overflow-y: auto; flex: 1; padding: 6px 0; }

    .p-row {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      gap: 10px;
      transition: background .2s;
      cursor: default;
    }
    .p-row.is-speaker { background: rgba(124,58,237,.1); }

    .p-num {
      font-size: .68rem;
      font-weight: 700;
      width: 18px;
      text-align: center;
      flex-shrink: 0;
      color: var(--muted);
    }
    .p-num.r1 { color: var(--gold); }
    .p-num.r2 { color: #94a3b8; }
    .p-num.r3 { color: #cd7f32; }

    .p-name {
      flex: 1;
      font-size: .88rem;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .p-row.is-speaker .p-name { color: var(--purple-l); }

    .p-stars {
      font-size: .82rem;
      font-weight: 700;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 3px;
      flex-shrink: 0;
    }

    .p-kick {
      width: 22px; height: 22px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: .75rem;
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .15s, color .15s;
    }
    .p-kick:hover { background: rgba(239,68,68,.15); color: var(--red); }

    /* ── Stage area (left/main) ───────────────────────────────────────────── */
    .stage {
      flex: 1;
      order: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      overflow: hidden;
      position: relative;
    }

    /* ── Idle: list with select buttons ──────────────────────────────────── */
    #idle-stage {
      width: 100%;
      max-width: 680px;
    }

    .idle-title {
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--sub);
      margin-bottom: 20px;
      text-align: center;
    }

    .select-list { display: flex; flex-direction: column; gap: 8px; }

    .select-row {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 14px 18px;
      gap: 14px;
      transition: border-color .2s;
    }
    .select-row:hover { border-color: rgba(124,58,237,.4); }

    .s-rank {
      font-size: .75rem;
      font-weight: 700;
      color: var(--muted);
      width: 22px;
      text-align: center;
      flex-shrink: 0;
    }
    .s-rank.r1 { color: var(--gold); }
    .s-rank.r2 { color: #94a3b8; }
    .s-rank.r3 { color: #cd7f32; }

    .s-name {
      flex: 1;
      font-size: 1rem;
      font-weight: 600;
    }

    .s-stars {
      font-size: .88rem;
      font-weight: 700;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 4px;
      min-width: 48px;
    }

    .s-play {
      padding: 9px 18px;
      background: var(--purple);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: .82rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .s-play:hover { background: #6d28d9; box-shadow: 0 4px 16px rgba(124,58,237,.35); }

    .empty-stage {
      text-align: center;
      color: var(--sub);
    }
    .empty-icon { font-size: 3rem; opacity: .25; margin-bottom: 16px; }
    .empty-text { font-size: .95rem; line-height: 1.6; }

    /* ── Presenting / Voting stage ────────────────────────────────────────── */
    #speaker-stage { text-align: center; width: 100%; }

    .speaking-label {
      font-size: clamp(.6rem, 1vw, .8rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--purple-l);
      margin-bottom: 18px;
    }

    .big-name {
      font-size: clamp(3.5rem, 8vw, 7.5rem);
      font-weight: 900;
      letter-spacing: -3px;
      line-height: 1;
      margin-bottom: 48px;
      animation: nameIn .5s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes nameIn {
      from { transform: scale(.88); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    /* Star slots */
    .stars-area { display: flex; flex-direction: column; align-items: center; gap: 16px; }

    .stars-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: clamp(6px, 1.2vw, 14px);
      max-width: 60vw;
    }

    .star-slot {
      font-size: clamp(1.8rem, 3.5vw, 3rem);
      line-height: 1;
      transition: color .3s, filter .3s;
      user-select: none;
    }
    .star-slot.empty  { color: var(--muted); }
    .star-slot.filled {
      color: var(--gold);
      filter: drop-shadow(0 0 8px rgba(245,158,11,.6));
      animation: starPop .4s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes starPop {
      0%   { transform: scale(0) rotate(-15deg); }
      60%  { transform: scale(1.25) rotate(5deg); }
      100% { transform: scale(1) rotate(0); }
    }

    .vote-count {
      font-size: .85rem;
      color: var(--sub);
    }
    .vote-count strong { color: var(--gold); font-weight: 700; }

    /* ── Confirm overlay ──────────────────────────────────────────────────── */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.75);
      align-items: center; justify-content: center;
      z-index: 100;
    }
    .overlay.open { display: flex; }
    .dialog {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px;
      max-width: 360px; width: 90%;
      text-align: center;
    }
    .dialog-icon  { font-size: 2rem; margin-bottom: 12px; }
    .dialog-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
    .dialog-sub   { color: var(--sub); font-size: .875rem; line-height: 1.5; margin-bottom: 24px; }
    .dialog-btns  { display: flex; gap: 10px; justify-content: center; }

    [hidden] { display: none !important; }

    /* ── Winner button ────────────────────────────────────────────────────── */
    .btn-winner {
      background: linear-gradient(135deg, #92400e, #d97706);
      color: #fef3c7;
      border: 1px solid #f59e0b;
      box-shadow: 0 0 12px rgba(245,158,11,.25);
    }
    .btn-winner:hover {
      box-shadow: 0 0 24px rgba(245,158,11,.5);
      transform: translateY(-1px);
    }

    /* ── Winner overlay ───────────────────────────────────────────────────── */
    #winner-overlay {
      display: none;
      position: fixed; inset: 0;
      background: #050510;
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }
    #winner-overlay.open { display: flex; }

    #confetti-canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .winner-content { position: relative; z-index: 1; }

    .winner-trophy {
      font-size: clamp(4rem, 8vw, 7rem);
      margin-bottom: 20px;
      animation: trophyBounce 1s cubic-bezier(.34,1.56,.64,1) forwards;
      display: block;
    }
    @keyframes trophyBounce {
      from { transform: scale(0) rotate(-15deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg);   opacity: 1; }
    }

    .winner-label {
      font-size: clamp(.75rem, 1.2vw, 1rem);
      font-weight: 800;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 18px;
      opacity: 0;
      animation: fadeUp .5s ease .3s forwards;
    }

    .winner-name {
      font-size: clamp(4rem, 11vw, 10rem);
      font-weight: 900;
      letter-spacing: -4px;
      line-height: 1;
      background: linear-gradient(135deg, #fbbf24, #f59e0b, #fde68a, #f59e0b);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp .5s ease .5s forwards, shimmer 2.5s ease-in-out infinite;
      opacity: 0;
    }
    @keyframes shimmer {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .winner-stars {
      margin-top: 28px;
      font-size: clamp(1.4rem, 2.5vw, 2rem);
      color: var(--gold);
      opacity: 0;
      animation: fadeUp .5s ease .75s forwards;
      letter-spacing: 4px;
    }

    .winner-close {
      position: absolute;
      top: 24px; right: 28px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      color: var(--sub);
      border-radius: 10px;
      padding: 8px 16px;
      font-family: 'Inter', sans-serif;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .winner-close:hover { color: var(--text); background: rgba(255,255,255,.12); }
  </style>
</head>
<body>

  <!-- ── Header ────────────────────────────────────────────────────────────── -->
  <header>
    <div class="logo">БА<em>ЛЫ</em></div>

    <div class="header-center">
      <div class="phase-badge idle" id="phase-badge">
        <div class="dot-badge dot-idle" id="phase-dot"></div>
        <span id="phase-text">Ожидание</span>
      </div>
    </div>

    <div class="header-actions">
      <!-- Idle actions -->
      <button class="btn btn-winner" id="btn-winner" onclick="showWinner()">🏆 Победитель</button>
      <button class="btn btn-ghost" id="btn-reset" onclick="confirmReset()">↺ Сбросить</button>

      <!-- Presenting actions -->
      <button class="btn btn-purple" id="btn-start-vote" onclick="doStartVoting()" hidden>
        ▶ Начать голосование
      </button>
      <button class="btn btn-red" id="btn-cancel-pres" onclick="doClose()" hidden>
        ✕ Отменить
      </button>

      <!-- Voting actions -->
      <button class="btn btn-red" id="btn-close-vote" onclick="doClose()" hidden>
        ■ Закрыть голосование
      </button>
    </div>
  </header>

  <!-- ── Main ──────────────────────────────────────────────────────────────── -->
  <div class="main">

    <!-- Stage -->
    <div class="stage">

      <!-- IDLE: select who speaks -->
      <div id="idle-stage">
        <div class="idle-title">Выберите выступающего</div>
        <div class="select-list" id="select-list">
          <div class="empty-stage">
            <div class="empty-icon">👥</div>
            <div class="empty-text">Участников пока нет.<br>Попросите коллег зайти по ссылке и ввести имя.</div>
          </div>
        </div>
      </div>

      <!-- PRESENTING / VOTING: speaker display -->
      <div id="speaker-stage" hidden>
        <div class="speaking-label">Выступает</div>
        <div class="big-name" id="big-name">—</div>
        <div class="stars-area">
          <div class="stars-row" id="stars-row"></div>
          <div class="vote-count" id="vote-count"></div>
        </div>
      </div>

    </div>

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-label">Участники</div>
        <div class="sidebar-count" id="sidebar-count">—</div>
      </div>
      <div class="sidebar-list" id="sidebar-list"></div>
    </div>

  </div>

  <!-- ── Winner overlay ───────────────────────────────────────────────────── -->
  <div id="winner-overlay">
    <canvas id="confetti-canvas"></canvas>
    <button class="winner-close" onclick="closeWinner()">✕ Закрыть</button>
    <div class="winner-content">
      <span class="winner-trophy">🏆</span>
      <div class="winner-label">Победитель</div>
      <div class="winner-name" id="winner-name">—</div>
      <div class="winner-stars" id="winner-stars"></div>
    </div>
  </div>

  <!-- ── Confirm reset ──────────────────────────────────────────────────────── -->
  <div class="overlay" id="overlay" onclick="closeOverlay(event)">
    <div class="dialog">
      <div class="dialog-icon">⚠️</div>
      <div class="dialog-title">Сбросить всё?</div>
      <div class="dialog-sub">Все участники и баллы будут удалены.<br>Действие нельзя отменить.</div>
      <div class="dialog-btns">
        <button class="btn btn-ghost" onclick="document.getElementById('overlay').classList.remove('open')">Отмена</button>
        <button class="btn btn-red" onclick="doReset()">Сбросить</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io({ reconnectionAttempts: Infinity, reconnectionDelay: 1000, reconnectionDelayMax: 5000 });

    let st = { participants: [], session: null };

    // ── State ────────────────────────────────────────────────────────────────
    socket.on('state', data => {
      st = data;
      render();
    });

    socket.on('full_reset', () => {
      st = { participants: [], session: null };
      render();
    });

    // ── Render ───────────────────────────────────────────────────────────────
    function render() {
      const { participants, session } = st;

      updateHeader(session);
      renderSidebar(participants, session);

      if (!session) {
        document.getElementById('idle-stage').hidden    = false;
        document.getElementById('speaker-stage').hidden = true;
        renderSelectList(participants);
      } else {
        document.getElementById('idle-stage').hidden    = true;
        document.getElementById('speaker-stage').hidden = false;
        document.getElementById('big-name').textContent = session.speaker.name;
        renderStars(session);
      }
    }

    function updateHeader(session) {
      const badge = document.getElementById('phase-badge');
      const dot   = document.getElementById('phase-dot');
      const text  = document.getElementById('phase-text');

      const btnStartVote  = document.getElementById('btn-start-vote');
      const btnCancelPres = document.getElementById('btn-cancel-pres');
      const btnCloseVote  = document.getElementById('btn-close-vote');

      if (!session) {
        badge.className = 'phase-badge idle';
        dot.className   = 'dot-badge dot-idle';
        text.textContent = 'Ожидание';
        btnStartVote.hidden  = true;
        btnCancelPres.hidden = true;
        btnCloseVote.hidden  = true;
      } else if (session.phase === 'presenting') {
        badge.className = 'phase-badge present';
        dot.className   = 'dot-badge dot-present';
        text.textContent = 'Выступает';
        btnStartVote.hidden  = false;
        btnCancelPres.hidden = false;
        btnCloseVote.hidden  = true;
      } else {
        badge.className = 'phase-badge voting';
        dot.className   = 'dot-badge dot-voting';
        text.textContent = 'Голосование';
        btnStartVote.hidden  = true;
        btnCancelPres.hidden = true;
        btnCloseVote.hidden  = false;
      }
    }

    function renderSelectList(participants) {
      const list = document.getElementById('select-list');
      if (participants.length === 0) {
        list.innerHTML = `
          <div class="empty-stage">
            <div class="empty-icon">👥</div>
            <div class="empty-text">Участников пока нет.<br>Попросите коллег зайти по ссылке и ввести имя.</div>
          </div>`;
        return;
      }
      list.innerHTML = '';
      participants.forEach((p, i) => {
        const row = document.createElement('div');
        row.className = 'select-row';
        let rankClass = 's-rank';
        if (i === 0) rankClass += ' r1';
        else if (i === 1) rankClass += ' r2';
        else if (i === 2) rankClass += ' r3';

        row.innerHTML = `
          <div class="${rankClass}">${i + 1}</div>
          <div class="s-name">${esc(p.name)}</div>
          <div class="s-stars"><span style="font-size:.75rem">★</span>${p.totalStars}</div>
          <button class="s-play" onclick="doSelectSpeaker('${p.id}')">▶ Выступать</button>
        `;
        list.appendChild(row);
      });
    }

    let _lastSpeakerId = null;

    function renderStars(session) {
      const row = document.getElementById('stars-row');
      const { stars, totalVoters, voterCount, phase } = session;

      const speakerChanged = session.speaker.id !== _lastSpeakerId;
      _lastSpeakerId = session.speaker.id;

      // Полная перестройка при смене выступающего или изменении числа слотов
      if (speakerChanged || row.children.length !== totalVoters) {
        row.innerHTML = '';
        for (let i = 0; i < totalVoters; i++) {
          const s = document.createElement('span');
          s.className = 'star-slot ' + (i < stars ? 'filled' : 'empty');
          s.textContent = '★';
          row.appendChild(s);
        }
      } else {
        // Только анимируем новые заполненные слоты
        Array.from(row.children).forEach((el, i) => {
          if (i < stars && el.classList.contains('empty')) {
            el.classList.replace('empty', 'filled');
          }
          // На случай отмены голоса — убираем лишние звёзды
          if (i >= stars && el.classList.contains('filled')) {
            el.classList.replace('filled', 'empty');
          }
        });
      }

      const cnt = document.getElementById('vote-count');
      if (phase === 'presenting') {
        cnt.innerHTML = totalVoters > 0
          ? `${totalVoters} ${plural(totalVoters,'участник','участника','участников')} смогут проголосовать`
          : 'Ожидание участников...';
      } else {
        cnt.innerHTML = totalVoters === 0
          ? 'Ожидание участников...'
          : `Проголосовали: <strong>${voterCount}</strong> из ${totalVoters}`;
      }
    }

    function renderSidebar(participants, session) {
      const speakerId = session?.speaker?.id ?? null;
      const list = document.getElementById('sidebar-list');
      list.innerHTML = '';

      participants.forEach((p, i) => {
        const row = document.createElement('div');
        row.className = 'p-row' + (p.id === speakerId ? ' is-speaker' : '');

        let numClass = 'p-num';
        if (i === 0) numClass += ' r1';
        else if (i === 1) numClass += ' r2';
        else if (i === 2) numClass += ' r3';

        row.innerHTML = `
          <div class="${numClass}">${i + 1}</div>
          <div class="p-name">${esc(p.name)}</div>
          <div class="p-stars"><span style="font-size:.7rem">★</span>${p.totalStars}</div>
          <button class="p-kick" title="Удалить" onclick="doKick('${p.id}')">✕</button>
        `;
        list.appendChild(row);
      });

      const n = participants.length;
      document.getElementById('sidebar-count').textContent =
        n === 0 ? 'Нет участников' : `${n} ${plural(n,'участник','участника','участников')}`;
    }

    // ── Admin actions ────────────────────────────────────────────────────────
    function doSelectSpeaker(id) { socket.emit('select_speaker', { participantId: id }); }
    function doStartVoting()     { socket.emit('start_voting'); }
    function doClose()           { socket.emit('close_voting'); }
    function doKick(id)          { socket.emit('kick', { participantId: id }); }

    function confirmReset() { document.getElementById('overlay').classList.add('open'); }
    function closeOverlay(e) {
      if (e.target === document.getElementById('overlay'))
        document.getElementById('overlay').classList.remove('open');
    }
    function doReset() {
      socket.emit('reset_all');
      document.getElementById('overlay').classList.remove('open');
    }

    // ── Winner ────────────────────────────────────────────────────────────────
    let confettiAnim = null;

    // Кнопка "Победитель" → отправляем на сервер, он рассылает всем
    function showWinner() {
      if (st.participants.length === 0) return;
      socket.emit('show_winner');
    }

    // Получаем от сервера — показываем оверлей
    socket.on('show_winner', ({ winner }) => {
      document.getElementById('winner-name').textContent  = winner.name;
      document.getElementById('winner-stars').textContent =
        winner.totalStars > 0 ? '★'.repeat(Math.min(winner.totalStars, 20)) : '';

      const overlay = document.getElementById('winner-overlay');
      overlay.classList.add('open');

      const nameEl   = overlay.querySelector('.winner-name');
      const labelEl  = overlay.querySelector('.winner-label');
      const starsEl  = overlay.querySelector('.winner-stars');
      const trophyEl = overlay.querySelector('.winner-trophy');
      [nameEl, labelEl, starsEl, trophyEl].forEach(el => {
        el.style.animation = 'none';
        el.offsetHeight;
        el.style.animation = '';
      });

      startConfetti();
    });

    function closeWinner() {
      document.getElementById('winner-overlay').classList.remove('open');
      stopConfetti();
    }

    // ── Confetti engine ───────────────────────────────────────────────────────
    function startConfetti() {
      const canvas = document.getElementById('confetti-canvas');
      const ctx    = canvas.getContext('2d');

      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;

      const COLORS = ['#f59e0b','#fbbf24','#fde68a','#7c3aed','#a78bfa',
                       '#ec4899','#06b6d4','#22c55e','#ef4444','#fff'];

      const particles = Array.from({ length: 160 }, () => makeParticle(canvas));

      function makeParticle(canvas, fromTop = false) {
        return {
          x:    Math.random() * canvas.width,
          y:    fromTop ? -10 : Math.random() * -canvas.height,
          w:    6  + Math.random() * 9,
          h:    3  + Math.random() * 5,
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
          rot:  Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - .5) * .18,
          vy:   2.5 + Math.random() * 3.5,
          vx:   (Math.random() - .5) * 2.5,
          opacity: .85 + Math.random() * .15,
        };
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach((p, i) => {
          p.y   += p.vy;
          p.x   += p.vx;
          p.rot += p.rotSpeed;
          if (p.y > canvas.height + 20) {
            particles[i] = makeParticle(canvas, true);
          }
          ctx.save();
          ctx.globalAlpha = p.opacity;
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);
          ctx.fillStyle = p.color;
          ctx.beginPath();
          // Mix of rectangles and circles
          if (i % 3 === 0) {
            ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2);
          } else {
            ctx.rect(-p.w / 2, -p.h / 2, p.w, p.h);
          }
          ctx.fill();
          ctx.restore();
        });
        confettiAnim = requestAnimationFrame(draw);
      }

      stopConfetti();
      draw();
    }

    function stopConfetti() {
      if (confettiAnim) { cancelAnimationFrame(confettiAnim); confettiAnim = null; }
    }

    // ── Utils ─────────────────────────────────────────────────────────────────
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function plural(n, one, few, many) {
      const m10 = n % 10, m100 = n % 100;
      if (m10 === 1 && m100 !== 11) return one;
      if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return few;
      return many;
    }
  </script>
</body>
